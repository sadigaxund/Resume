name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "template/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile PDF (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: template/Template_Resumé.tex
          latexmk_use_xelatex: true

      - name: Copy PDF to root
        run: cp template/Template_Resumé.pdf Template_Resumé.pdf

      - name: Archive dated copy
        run: |
          mkdir -p Archive
          DATE=$(date -u +%Y-%m-%d)
          cp -f Template_Resumé.pdf "Archive/Template_Resumé_${DATE}.pdf"

      - name: Commit build artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Template_Resumé.pdf Archive/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m ">> 📄 Resume generated on ${DATE}"
          git push
