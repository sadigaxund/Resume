name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "template/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

env:
  TEMPLATE: template/Template_Resumé.tex

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile PDF (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ env.TEMPLATE }}
          latexmk_use_xelatex: true

      - name: Determine filenames
        run: |
          STEM=$(basename "${{ env.TEMPLATE }}" .tex)
          echo "STEM=$STEM" >> $GITHUB_ENV
          AUTHOR_STEM=$(echo "${{ vars.AUTHOR }}" | tr -d '[:space:]')
          echo "AUTHOR_STEM=${AUTHOR_STEM:-$STEM}" >> $GITHUB_ENV

      - name: Archive dated copy
        run: |
          mkdir -p Archive
          DATE=$(date -u +%Y-%m-%d)
          cp -f "${STEM}.pdf" "Archive/${AUTHOR_STEM}_${DATE}.pdf"

      - name: Commit build artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${STEM}.pdf" Archive/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m ">> Resume generated on ${DATE}"
          git push
