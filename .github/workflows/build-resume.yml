name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "template/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

env:
  CFG: template/resume.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read config
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import yaml, os
          c = yaml.safe_load(open(os.environ['CFG']))
          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f"AUTHOR={c.get('author', '')}\n")
              env.write(f"TEMPLATE={c.get('template', '')}\n")
          PYEOF

      - name: Generate server config
        run: |
          python3 << 'PYEOF'
          import json, os
          config = {
              'author': os.environ['AUTHOR'],
              'owner': '${{ github.repository_owner }}',
              'repo': '${{ github.event.repository.name }}',
              'branch': '${{ github.ref_name }}',
          }
          with open('app/config.json', 'w') as f:
              json.dump(config, f, indent=2)
          PYEOF

      - name: Update install.sh with repo URL
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          sed -i "s|^REPO_URL=.*|REPO_URL=\"${REPO_URL}\"|" install.sh

      - name: Compile PDF (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: template/${{ env.TEMPLATE }}
          latexmk_use_xelatex: true

      - name: Copy PDF to root
        run: |
          STEM=$(basename "${{ env.TEMPLATE }}" .tex)
          AUTHOR_STEM=$(echo "${{ env.AUTHOR }}" | tr -d '[:space:]')
          PREFIX="${AUTHOR_STEM:-$STEM}"
          echo "PREFIX=$PREFIX" >> $GITHUB_ENV
          echo "STEM=$STEM" >> $GITHUB_ENV
          cp "template/${STEM}.pdf" "${STEM}.pdf"

      - name: Archive dated copy
        run: |
          mkdir -p Archive
          DATE=$(date -u +%Y-%m-%d)
          cp -f "${STEM}.pdf" "Archive/${PREFIX}_${DATE}.pdf"

      - name: Commit build artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${STEM}.pdf" Archive/ install.sh app/config.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m ">> Resume generated on ${DATE}"
          git push
