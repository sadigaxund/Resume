name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - "template/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-resume
  cancel-in-progress: false

env:
  CFG: template/resume.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TeX Live image digest
        id: digest
        run: |
          DIGEST=$(docker manifest inspect ghcr.io/xu-cheng/texlive-full:latest 2>/dev/null | \
            jq -r '
              if .manifests then
                [.manifests[] | select(.platform.arch == "amd64") | .digest][0] // .manifests[0].digest
              elif .config then
                .config.digest
              else "" end' 2>/dev/null || echo "")
          echo "digest=${DIGEST:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache TeX Live Docker image
        uses: actions/cache@v4
        id: cache-texlive
        with:
          path: /tmp/texlive-docker
          key: texlive-${{ steps.digest.outputs.digest }}

      - name: Load TeX Live image (cache hit)
        if: steps.cache-texlive.outputs.cache-hit == 'true'
        run: docker load -i /tmp/texlive-docker/image.tar

      - name: Pull and save TeX Live image (cache miss)
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/xu-cheng/texlive-full:latest
          mkdir -p /tmp/texlive-docker
          docker save ghcr.io/xu-cheng/texlive-full:latest -o /tmp/texlive-docker/image.tar

      - name: Read config
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import yaml, os
          c = yaml.safe_load(open(os.environ['CFG']))
          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f"AUTHOR={c.get('author', '')}\n")
              env.write(f"TEMPLATE={c.get('template', '')}\n")
              env.write(f"OUTPUT={c.get('output', '')}\n")
          PYEOF

      - name: Generate server config
        run: |
          python3 << 'PYEOF'
          import json, os
          config = {
              'author': os.environ['AUTHOR'],
              'owner': '${{ github.repository_owner }}',
              'repo': '${{ github.event.repository.name }}',
              'branch': '${{ github.ref_name }}',
          }
          with open('app/config.json', 'w') as f:
              json.dump(config, f, indent=2)
          PYEOF

      - name: Update install.sh with repo URL
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          sed -i "s|^REPO_URL=.*|REPO_URL=\"${REPO_URL}\"|" install.sh

      - name: Compile PDF (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: template/${{ env.TEMPLATE }}
          latexmk_use_xelatex: true
          work_in_root_file_dir: true
          extra_fonts: |
            template/fonts/*.ttf

      - name: Prepare PDFs
        run: |
          STEM=$(basename "${{ env.TEMPLATE }}" .tex)
          OUTPUT="${{ env.OUTPUT }}"
          [ -z "$OUTPUT" ] && OUTPUT="$STEM"
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV
          if [ ! -f "${STEM}.pdf" ]; then
            cp "template/${STEM}.pdf" "${STEM}.pdf"
          fi
          if [ "${STEM}.pdf" != "${OUTPUT}.pdf" ]; then
            cp "${STEM}.pdf" "${OUTPUT}.pdf"
          fi
          mkdir -p Archive
          DATE=$(date -u +%Y-%m-%d)
          cp -f "${OUTPUT}.pdf" "Archive/${OUTPUT}_${DATE}.pdf"

      - name: Upload PDFs to Release
        run: |
          gh release view resume 2>/dev/null || \
            gh release create resume --title "Resume PDFs" --notes "Automated builds"
          gh release upload resume "${OUTPUT}.pdf" --clobber
          gh release upload resume "Archive/${OUTPUT}_${DATE}.pdf"

      - name: Commit config files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add install.sh app/config.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m ">> Config update"
          git push
