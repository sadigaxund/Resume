name: Build Resume
run-name: Resume build

on:
  push:
    branches: [main]
    paths:
      - "template/**"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-resume
  cancel-in-progress: false

env:
  CFG: template/resume.yml

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check TeX Live image digest
        id: digest
        run: |
          DIGEST=$(docker manifest inspect ghcr.io/xu-cheng/texlive-full:latest 2>/dev/null | \
            jq -r '
              if .manifests then
                [.manifests[] | select(.platform.arch == "amd64") | .digest][0] // .manifests[0].digest
              elif .config then
                .config.digest
              else "" end' 2>/dev/null || echo "")
          echo "digest=${DIGEST:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache TeX Live Docker image
        uses: actions/cache@v4
        id: cache-texlive
        with:
          path: /tmp/texlive-docker
          key: texlive-${{ steps.digest.outputs.digest }}

      - name: Load TeX Live image (cache hit)
        if: steps.cache-texlive.outputs.cache-hit == 'true'
        run: docker load -i /tmp/texlive-docker/image.tar

      - name: Pull and save TeX Live image (cache miss)
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/xu-cheng/texlive-full:latest
          mkdir -p /tmp/texlive-docker
          docker save ghcr.io/xu-cheng/texlive-full:latest -o /tmp/texlive-docker/image.tar

      - name: Read config
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import yaml, os
          c = yaml.safe_load(open(os.environ['CFG']))
          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f"AUTHOR={c.get('author', '')}\n")
              env.write(f"TEMPLATE={c.get('template', '')}\n")
              env.write(f"OUTPUT={c.get('output', '')}\n")
          PYEOF

      - name: Compile PDF (XeLaTeX)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: template/${{ env.TEMPLATE }}
          latexmk_use_xelatex: true
          work_in_root_file_dir: true
          extra_fonts: |
            template/fonts/*.ttf

      - name: Prepare PDFs
        run: |
          STEM=$(basename "${{ env.TEMPLATE }}" .tex)
          OUTPUT="${{ env.OUTPUT }}"
          [ -z "$OUTPUT" ] && OUTPUT="$STEM"
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV
          if [ ! -f "${STEM}.pdf" ]; then
            cp "template/${STEM}.pdf" "${STEM}.pdf"
          fi
          if [ "${STEM}.pdf" != "${OUTPUT}.pdf" ]; then
            cp "${STEM}.pdf" "${OUTPUT}.pdf"
          fi
          mkdir -p Archive
          DATE=$(date -u +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_ENV
          cp -f "${OUTPUT}.pdf" "Archive/${OUTPUT}_${DATE}.pdf"

      - name: Upload PDFs to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG_DATE="resume-${DATE}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download"
          LATEST_URL="${BASE}/latest/${OUTPUT}.pdf"
          DATED_URL="${BASE}/${TAG_DATE}/${OUTPUT}_${DATE}.pdf"
          NOTES_LATEST_BUILT=$(printf "Built on %s\n\n[Download PDF](%s)" "$(date -u)" "$LATEST_URL")
          NOTES_DATED_BUILT=$(printf "Built on %s\n\n[Download PDF](%s)" "$(date -u)" "$DATED_URL")
          NOTES_LATEST_VERIFIED=$(printf "Verified unchanged on %s\n\n[Download PDF](%s)" "$(date -u)" "$LATEST_URL")
          NOTES_DATED_VERIFIED=$(printf "Verified unchanged on %s\n\n[Download PDF](%s)" "$(date -u)" "$DATED_URL")

          TMPFILE=$(mktemp)
          CHANGED=1
          if gh release download latest -p "${OUTPUT}.pdf" -o "$TMPFILE" 2>/dev/null; then
            CURRENT=$(sha256sum "$TMPFILE" | cut -d' ' -f1)
            NEW=$(sha256sum "${OUTPUT}.pdf" | cut -d' ' -f1)
            [ "$CURRENT" = "$NEW" ] && CHANGED=0
          fi
          rm -f "$TMPFILE"

          gh release view latest 2>/dev/null || \
            gh release create latest --title "Latest Resume" --notes "$NOTES_LATEST_BUILT"

          if [ "$CHANGED" = "1" ]; then
            gh release delete "$TAG_DATE" -y --cleanup-tag 2>/dev/null || true
            gh release create "$TAG_DATE" \
              --title "Resume ${DATE}" \
              --prerelease \
              --notes "$NOTES_DATED_BUILT" \
              "Archive/${OUTPUT}_${DATE}.pdf"
            gh release upload latest "${OUTPUT}.pdf" --clobber
            gh release edit latest --latest --notes "$NOTES_LATEST_BUILT"
          else
            gh release upload latest "${OUTPUT}.pdf" --clobber
            gh release edit latest --latest --notes "$NOTES_LATEST_VERIFIED"
            LATEST_DATED=$(gh release list --limit 50 --json tagName --jq \
              '[.[].tagName | select(startswith("resume-"))] | .[0] // empty' 2>/dev/null || true)
            if [ -n "$LATEST_DATED" ]; then
              gh release edit "$LATEST_DATED" --notes "$NOTES_DATED_VERIFIED"
            else
              gh release delete "$TAG_DATE" -y --cleanup-tag 2>/dev/null || true
              gh release create "$TAG_DATE" \
                --title "Resume ${DATE}" \
                --prerelease \
                --notes "$NOTES_DATED_BUILT" \
                "Archive/${OUTPUT}_${DATE}.pdf"
            fi
          fi

      - name: Generate Pages site
        run: |
          mkdir -p public
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>{{AUTHOR}} — Resume</title>
          <style>
            *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
            body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#525659;height:100vh;display:flex;flex-direction:column}
            .toolbar{background:#1a1a1a;color:#fff;display:flex;align-items:center;padding:.5rem 1rem;gap:.75rem;flex-shrink:0}
            .toolbar h1{font-size:1rem;font-weight:500}
            select{padding:.4rem .5rem;border-radius:4px;border:1px solid #555;background:#333;color:#fff;font-size:.875rem;cursor:pointer}
            select:focus{outline:none;border-color:#2563eb}
            .btn{display:inline-block;padding:.4rem 1rem;background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.875rem;text-decoration:none;line-height:1.4;margin-left:auto}
            .btn:hover{background:#1d4ed8}
            .viewer{flex:1;display:flex;justify-content:center;overflow:auto}
            .viewer object{width:100%;height:100%}
          </style>
          </head>
          <body>
          <div class="toolbar">
            <h1>{{AUTHOR}} — Resume</h1>
            <select id="versionSelect"></select>
            <a class="btn" id="downloadBtn" href="#" download>Download</a>
          </div>
          <div class="viewer">
            <object id="pdfViewer" type="application/pdf" width="100%" height="100%">
              <p>Your browser doesn't support PDF viewing. <a id="fallbackLink" href="#">Download the resume</a>.</p>
            </object>
          </div>
          <script>
            const owner='{{OWNER}}',repo='{{REPO}}',viewer=document.getElementById('pdfViewer'),downloadBtn=document.getElementById('downloadBtn'),fallbackLink=document.getElementById('fallbackLink'),select=document.getElementById('versionSelect'),entries=[];
            function loadVersion(e){viewer.data=e.url;downloadBtn.href=e.url;downloadBtn.download=e.name;if(fallbackLink)fallbackLink.href=e.url}
            fetch('https://api.github.com/repos/'+owner+'/'+repo+'/releases').then(r=>r.json()).then(releases=>{for(const rel of releases){if(rel.tag_name==='latest'){for(const a of rel.assets||[]){if(a.name.endsWith('.pdf'))entries.push({label:'Latest',url:a.browser_download_url,name:a.name})}}else if(rel.tag_name.startsWith('resume-')){const d=rel.tag_name.slice(7);for(const a of rel.assets||[]){if(a.name.endsWith('.pdf'))entries.push({label:d,url:a.browser_download_url,name:a.name})}}}
            entries.forEach((e,i)=>{const o=document.createElement('option');o.value=i;o.textContent=e.label;select.appendChild(o)});select.addEventListener('change',()=>loadVersion(entries[select.value]));if(entries.length)loadVersion(entries[0])}).catch(e=>console.error(e));
          </script>
          </body>
          </html>
          EOF
          sed -i "s|{{AUTHOR}}|${AUTHOR}|g; s|{{OWNER}}|${{ github.repository_owner }}|g; s|{{REPO}}|${{ github.event.repository.name }}|g" public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
